services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learning_companion}
      POSTGRES_USER: ${POSTGRES_USER:-learning_companion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learning_companion}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-learning_companion}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
