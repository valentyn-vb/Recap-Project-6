spring.application.name=demo

# Datasource — defaults match the local docker-compose dev database; override via env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/learning_companion}
spring.datasource.username=${DB_USERNAME:learning_companion}
spring.datasource.password=${DB_PASSWORD:learning_companion}

# Schema management — dev simplification until a migration tool is introduced.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
