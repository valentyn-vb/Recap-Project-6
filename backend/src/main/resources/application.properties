spring.application.name=demo

# Datasource — defaults match the local docker-compose dev database; override via env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/learning_companion}
spring.datasource.username=${DB_USERNAME:learning_companion}
spring.datasource.password=${DB_PASSWORD:learning_companion}

# Schema management — dev keeps Hibernate DDL for convenience; Flyway migrations
# own the schema in prod (see application-prod.properties) and in tests.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=false

# JWT — secret must come from the environment, never hardcode it here.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
