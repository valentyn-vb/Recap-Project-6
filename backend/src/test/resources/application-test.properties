# Test-only values so the Spring context loads without real environment variables.
app.jwt.secret=test-only-secret-test-only-secret-test-only-secret
app.jwt.expiration-ms=3600000

# Integration tests run against the real Flyway migrations and validate that the
# JPA entities match the migrated schema (no manual schema drift).
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
